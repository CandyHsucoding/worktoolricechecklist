<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食米用量登記表</title>
  
  <!-- 載入 Tailwind CSS (用於畫面排版) -->
  <script src="assets/vendor/tailwindcss.js"></script>
  
  <!-- 載入 React 與 ReactDOM -->
  <script src="assets/vendor/react.production.min.js"></script>
  <script src="assets/vendor/react-dom.production.min.js"></script>

  <style>
    /* 列印時強制顯示背景顏色並設定 A4 邊界 */
    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      /* 設定為 A4 尺寸，並縮小邊界以確保塞滿一頁 */
      @page { 
        size: A4 portrait;
        margin: 0.8cm; 
      }
      /* 確保輸入框在列印時不會有預設的內距撐開高度 */
      input {
        padding: 0 !important;
        height: auto !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="assets/app.js"></script>
</body>
</html>
